<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SGNG</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="lt-root">
    <div class="lt-shell">
      <div class="lt-header">
        <div class="lt-title">Student Admissions Registration<small></small></div>
        <div class="lt-code-pill" id="lt-code-pill">—</div>
      </div>

      <div class="lt-carousel" aria-hidden="true">
        <div class="lt-carousel-track">
          <div class="lt-carousel-item"><img src="images/nurse-care.svg" alt=""><span>Nursing Care Training</span></div>
          <div class="lt-carousel-item"><img src="images/pharmacy-lab.svg" alt=""><span>Pharmacy Studies</span></div>
          <div class="lt-carousel-item"><img src="images/chemistry-lab.svg" alt=""><span>Chemistry & Biochemistry</span></div>
          <div class="lt-carousel-item"><img src="images/medical-lab.svg" alt=""><span>Medical Diagnostics</span></div>
          <div class="lt-carousel-item"><img src="images/language-training.svg" alt=""><span>Foreign Language Training</span></div>
          <!-- duplicated for seamless infinite scroll -->
          <div class="lt-carousel-item"><img src="images/nurse-care.svg" alt=""><span>Nursing Care Training</span></div>
          <div class="lt-carousel-item"><img src="images/pharmacy-lab.svg" alt=""><span>Pharmacy Studies</span></div>
          <div class="lt-carousel-item"><img src="images/chemistry-lab.svg" alt=""><span>Chemistry & Biochemistry</span></div>
          <div class="lt-carousel-item"><img src="images/medical-lab.svg" alt=""><span>Medical Diagnostics</span></div>
          <div class="lt-carousel-item"><img src="images/language-training.svg" alt=""><span>Foreign Language Training</span></div>
        </div>
      </div>

      <div id="lt-mode-banner"></div>
      <div id="lt-panel"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
